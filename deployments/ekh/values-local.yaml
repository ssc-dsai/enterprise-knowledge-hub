replicaCount: 1

image:
  repository: ghcr.io/ssc-dsai/enterprise-knowledge-hub
  pullPolicy: IfNotPresent
  tag: "0.1.0" # CPU only, for testing on minikube locally.

imagePullSecrets:
  - name: ghcr-pull-secret

contentStorage:
  enabled: true
  size: 5Gi
  accessModes:
    - ReadWriteMany
  storageClass: ""
  annotations: {}

pgvector:
  enabled: true
  # host defaults to <release-name>-pgvector automatically — override only if needed
  host: ""
  port: 5432
  batchSize: 100
  initdb:
    # SQL source files live in sql/*.sql and are loaded into a ConfigMap by templates/initdb-configmap.yaml.
    scriptsConfigMap: "ekh-initdb"
  config: # https://artifacthub.io/packages/helm/cloudpirates-postgres/postgres#postgresql-configuration
    postgresql:
        max_connections: 200
        shared_buffers: "256MB"
        effective_cache_size: "1GB"
        work_mem: "256MB"
        maintenance_work_mem: "4GB"
  persistence:
    size: 25Gi

  # The pgvector image runs as UID 999 (postgres). Without fsGroup=999,
  # docker-entrypoint.sh cannot chmod /var/run/postgresql → pod crashes mid-init
  # → PGDATA is left partially written → every restart skips initdb scripts.
  podSecurityContext:
    fsGroup: 999
