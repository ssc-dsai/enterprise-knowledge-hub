replicaCount: 1

image:
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: ghcr-pull-secret

contentStorage:
  enabled: true
  size: 5Gi
  accessModes:
    - ReadWriteMany
  storageClass: ""
  annotations: {}

pgvector:
  enabled: true
  # host defaults to <release-name>-pgvector automatically — override only if needed
  host: ""
  port: 5432
  batchSize: 100
  initdb:
    scripts:
      # TODO: LOAD FILE for database bootstrap, see project doc/convert to sql or something
      init_pgvector.sql: |
        CREATE EXTENSION IF NOT EXISTS vector;
  config:
    postgresqlMaxConnections: 200
    postgresqlSharedBuffers: "256MB"
    postgresqlEffectiveCacheSize: "1GB"
    postgresqlWorkMem: "256MB"
    postgresqlMaintenanceWorkMem: "4GB"