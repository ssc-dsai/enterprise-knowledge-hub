replicaCount: 1

image:
  repository: ghcr.io/ssc-dsai/enterprise-knowledge-hub
  pullPolicy: IfNotPresent
  tag: "0.1.0" # CPU only, for testing on minikube locally.

imagePullSecrets:
  - name: ghcr-pull-secret

contentStorage:
  enabled: true
  size: 5Gi
  accessModes:
    - ReadWriteMany
  storageClass: ""
  annotations: {}

pgvector:
  enabled: true
  # host defaults to <release-name>-pgvector automatically — override only if needed
  host: ""
  port: 5432
  batchSize: 100
  initdb:
    scripts:
      00_init_pgvector.sql: |
        CREATE EXTENSION IF NOT EXISTS vector;
      # TODO: load from a file instead, we don't have a central one yet, just documentation.
      01_init_ekh_schema.sql: |
        CREATE TABLE documents (
          id SERIAL PRIMARY KEY,
          pid INT,
          name TEXT,
          chunk_index INT,
          title TEXT,
          content TEXT,
          source TEXT,
          last_modified_date DATE,
          embedding VECTOR(512),
          CONSTRAINT documents_pid_chunk_index_key UNIQUE (pid, chunk_index)
        );
        CREATE INDEX IF NOT EXISTS wikipedia_embedding_index
          ON documents USING ivfflat (embedding vector_cosine_ops) WITH (lists = 3464);
  config:
    postgresqlMaxConnections: 200
    postgresqlSharedBuffers: "256MB"
    postgresqlEffectiveCacheSize: "1GB"
    postgresqlWorkMem: "256MB"
    postgresqlMaintenanceWorkMem: "4GB"
  persistence:
    size: 25Gi

  # The pgvector image runs as UID 999 (postgres). Without fsGroup=999,
  # docker-entrypoint.sh cannot chmod /var/run/postgresql → pod crashes mid-init
  # → PGDATA is left partially written → every restart skips initdb scripts.
  podSecurityContext:
    fsGroup: 999
