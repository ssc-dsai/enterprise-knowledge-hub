name: Docker (Build/Push)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  IMAGE_NAME: enterprise-knowledge-hub
  REGISTRY: ghcr.io
  JOBS_AND_THREADS: 8 # this currently runs the cuda jobs in 30ish minutes

jobs:
  build-cpu:
    runs-on: arc-ssc-dsai
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from pyproject.toml
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(grep -m1 '^version' pyproject.toml | sed 's/version = "(.*)"/\1/')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Validate tag matches pyproject version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "${TAG_VERSION}" != "${{ steps.version.outputs.version }}" ]; then
            echo "Tag version (${TAG_VERSION}) does not match pyproject.toml version (${{ steps.version.outputs.version }})."
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push CPU image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: BASE_IMAGE=cpu
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository }}:sha-${{ github.sha }}

  # Build for h100/h200 series
  build-cuda-h100-h200:
    runs-on: arc-ssc-dsai
    permissions:
      contents: read
      packages: write
    env:
      CUDA_ARCH: "9.0" # h100/h200
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from pyproject.toml
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(grep -m1 '^version' pyproject.toml | sed 's/version = "(.*)"/\1/')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Validate tag matches pyproject version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "${TAG_VERSION}" != "${{ steps.version.outputs.version }}" ]; then
            echo "Tag version (${TAG_VERSION}) does not match pyproject.toml version (${{ steps.version.outputs.version }})."
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push CUDA image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            BASE_IMAGE=cuda
            CUDA_ARCH=${{ env.CUDA_ARCH }}
            JOBS_AND_THREADS=${{ env.JOBS_AND_THREADS }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}:${{ steps.version.outputs.version }}-cuda-${{ env.CUDA_ARCH }}
            ${{ env.REGISTRY }}/${{ github.repository }}:sha-${{ github.sha }}-cuda-${{ env.CUDA_ARCH }}

  # Build for l40 series
  build-cuda-l40:
    runs-on: arc-ssc-dsai
    permissions:
      contents: read
      packages: write
    env:
      CUDA_ARCH: "8.9" #l40, etc.
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from pyproject.toml
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(grep -m1 '^version' pyproject.toml | sed 's/version = "(.*)"/\1/')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Validate tag matches pyproject version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "${TAG_VERSION}" != "${{ steps.version.outputs.version }}" ]; then
            echo "Tag version (${TAG_VERSION}) does not match pyproject.toml version (${{ steps.version.outputs.version }})."
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push CUDA image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            BASE_IMAGE=cuda
            CUDA_ARCH=${{ env.CUDA_ARCH }}
            JOBS_AND_THREADS=${{ env.JOBS_AND_THREADS }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}:${{ steps.version.outputs.version }}-cuda-${{ env.CUDA_ARCH }}
            ${{ env.REGISTRY }}/${{ github.repository }}:sha-${{ github.sha }}-cuda-${{ env.CUDA_ARCH }}
